version: '3.3'

services:
  mongodb:
    image: mongo:latest
    container_name: bloodmate-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: farhanraju/bloodmate-backend:latest
    container_name: bloodmate-app
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/bloodmate
    depends_on:
      - mongodb

volumes:
  mongo-data:
 
