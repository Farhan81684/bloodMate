apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bloodmate-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: / 
spec:
  ingressClassName: nginx
  rules:
  - host: bloodmate.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bloodmate-service
            port:
              number: 80
